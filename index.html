<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NoPing — Game Booster. IA-powered routing, FPS boost e multi-conexão. Tire o lag, aumente o FPS e jogue sem limites em +2000 jogos.">
  <title>NoPing — Game Booster · Reduza o ping, aumente o FPS</title>

  <!-- Google fonts: Space Grotesk + Geist Mono + Rajdhani (home-v2) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Global tokens (for header/footer that use --np-* vars) -->
  <link rel="stylesheet" href="src/styles/global/variables.css">
  <!-- Home v2 tokens + base (overlay; defines --green, --bg-*, --font-sans) -->
  <link rel="stylesheet" href="src/styles/home-v2/tokens.css">
  <link rel="stylesheet" href="src/styles/home-v2/base.css">
  <link rel="stylesheet" href="src/styles/home-v2/components.css">
  <link rel="stylesheet" href="src/styles/home-v2/layout.css">
  <!-- Global header/footer chrome (use --np-* tokens) -->
  <link rel="stylesheet" href="src/styles/components/header.css">
  <link rel="stylesheet" href="src/styles/components/footer.css">
  <!-- Integration bridge (loaded LAST — resolves home-v2 vs global conflicts) -->
  <link rel="stylesheet" href="src/styles/home-v2/_integration.css">

  <!-- Tweak defaults for the home v2 design tweaks panel -->
  <script type="application/json" id="tweak-defaults">
/*EDITMODE-BEGIN*/{
  "globeStyle": "realistic",
  "heroLayout": "split",
  "density": "minimal",
  "copyTone": "tecnico",
  "typeDirection": "grotesk"
}/*EDITMODE-END*/
  </script>

  <!-- React + Babel (pinned versions, required for inline JSX) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Anchor the page at the top during the (potentially slow) Babel-
       transpile boot so the user never momentarily sees the footer. The
       React app mounts into #root after this fires; `min-height` on
       #root (set in _integration.css) reserves a full viewport so the
       footer can never appear in the first paint. -->
  <script>
    try { history.scrollRestoration = 'manual'; } catch (e) {}
    window.scrollTo(0, 0);
  </script>
</head>
<body class="home-page" data-page="home" data-screen-label="Home v2 · NoPing">

  <div class="grid-bg"></div>

  <!-- ========== GLOBAL HEADER (injected) ========== -->
  <header id="global-header" data-active="home"></header>

  <!-- ========== HOME v2 React app ========== -->
  <div id="root"></div>

  <!-- ========== GLOBAL FOOTER (injected) ========== -->
  <footer id="global-footer"></footer>

  <!-- Home v2 JSX modules — must load BEFORE App.jsx -->
  <script type="text/babel" src="src/scripts/home-v2/copy.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/icons.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/hooks.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/pops.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/Globe.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/Hero.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/Stats.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/Tech.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/FpsBooster.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/MultiGame.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/AppDashboard.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/Coverage.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/ProPlayers.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/Media.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/Faq.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/CtaBanner.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/TweaksPanel.jsx"></script>
  <script type="text/babel" src="src/scripts/home-v2/App.jsx"></script>

  <!-- Global components (header + footer injection) -->
  <script src="src/components/header.js"></script>
  <script src="src/components/footer.js"></script>
  <script src="src/components/faq.js"></script>
  <script src="src/components/carousel.js"></script>
  <!-- Global helpers (lang toggle, etc.) -->
  <script src="src/scripts/global/helpers.js"></script>
  <script src="src/scripts/global/navigation.js"></script>
  <script src="src/scripts/global/interactions.js"></script>
  <script src="src/scripts/global/main.js"></script>
</body>
</html>
