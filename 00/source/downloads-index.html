<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Baixe o NoPing para Windows, Mac, iPhone ou Android. Otimize sua conexão e jogue sem lag com a melhor tecnologia de redução de ping.">
  <title>Download NoPing | Baixe grátis para PC, Mac, iOS e Android</title>
  <link rel="stylesheet" href="src/styles/global.css">
  <link rel="stylesheet" href="src/styles/layout.css">
  <link rel="stylesheet" href="src/styles/hero.css">
</head>
<body>



  <!-- ========== HEADER ========== -->
  <header id="global-header"></header>

  <main>
    <!-- ========== HERO ========== -->
    <section class="hero" id="hero">
      <!-- ========== PARTICLES (hero background layer) ========== -->
      <canvas id="particles-canvas" class="particles-canvas"></canvas>

      <div class="container hero__content">
        <div class="hero__copy">
          <h1 class="hero__title">Jogue sem lag no <span class="text-primary">Desktop</span> e <span class="text-primary">Mobile</span></h1>
          <p class="hero__subtitle">
            A melhor tecnologia de otimização de rotas agora disponível para <strong>Windows, Mac, iPhone (App Store)</strong> e <strong>Android (Play Store)</strong>.
          </p>
          <div class="hero__downloads" id="hero-downloads">
            <div class="hero__downloads-group">
              <button class="btn active">
                <img src="images/icons/icon-download.svg" alt="Download" class="btn-icon">
                Windows
              </button>
              <button class="btn">
                <img src="images/icons/mac-logo.svg" alt="Mac" class="btn-icon">
                Mac
              </button>
            </div>
            <div class="hero__downloads-group">
              <button class="btn">
                <img src="images/icons/icon-mobile.svg" alt="iOS" class="btn-icon">
                App Store
              </button>
              <button class="btn">
                <img src="images/icons/icon-android.svg" alt="Android" class="btn-icon">
                Play Store
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer id="global-footer"></footer>
  <script src="src/components/header.js"></script>
  <script src="src/components/footer.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
