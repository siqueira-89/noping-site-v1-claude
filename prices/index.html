<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Planos e preços NoPing. Compare benefícios e comece grátis por 1 dia. (Em construção)">
  <title>NoPing · Preços e Planos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS (Play CDN) + projeto config (tokens --np-* mapeados) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../src/scripts/global/tailwind-config.js"></script>

  <!-- Global -->
  <link rel="stylesheet" href="../src/styles/global/variables.css">
  <link rel="stylesheet" href="../src/styles/global/reset.css">
  <link rel="stylesheet" href="../src/styles/global/typography.css">
  <link rel="stylesheet" href="../src/styles/global/layout.css">
  <link rel="stylesheet" href="../src/styles/global/utilities.css">
  <!-- Components (globais — não mexer, dependem do JS injetor) -->
  <link rel="stylesheet" href="../src/styles/components/header.css">
  <link rel="stylesheet" href="../src/styles/components/footer.css">
  <link rel="stylesheet" href="../src/styles/components/buttons.css">
  <link rel="stylesheet" href="../src/styles/components/cards.css">
  <link rel="stylesheet" href="../src/styles/components/forms.css">
  <!-- Overrides (exceções fora do Tailwind — keyframes, glow, blur, canvas) -->
  <link rel="stylesheet" href="../src/styles/overrides.css">
</head>
<body class="prices-page" data-page="prices" data-screen-label="Preços">

  <div class="grid-bg"></div>

  <!-- ========== HEADER (injected) ========== -->
  <header id="global-header" data-active="prices"></header>

  <main>
    <section id="hero" class="relative min-h-screen pt-header flex items-center justify-center text-center overflow-hidden">
      <div class="relative z-[2] max-w-[720px] px-8 py-np-2xl mx-auto">
        <span class="eyebrow justify-center mb-np-md">PLANOS E PREÇOS</span>
        <h1 class="mb-np-md">Quanto custa<br>jogar <em class="not-italic text-np-primary">sem lag?</em></h1>
        <p class="text-np-fg-dim text-[1.05rem] leading-relaxed mx-auto mb-np-lg max-w-[540px]">Estamos finalizando os detalhes dos planos. Em breve você vai escolher o que combina com seu setup — do casual ao competitivo profissional.</p>
        <span class="inline-flex items-center gap-[10px] px-[18px] py-[10px] rounded-np-pill border border-dashed border-np-primary/25 bg-np-primary/[0.04] font-np-mono text-[11px] tracking-[0.18em] uppercase text-np-primary">Página em construção · base pronta para conteúdo</span>
      </div>
    </section>
  </main>

  <!-- ========== FOOTER (injected) ========== -->
  <footer id="global-footer"></footer>

  <!-- Components -->
  <script src="../src/components/header.js"></script>
  <script src="../src/components/footer.js"></script>
  <script src="../src/components/faq.js"></script>
  <script src="../src/components/carousel.js"></script>
  <script src="../src/components/buttons.js"></script>
  <!-- Global -->
  <script src="../src/scripts/global/helpers.js"></script>
  <script src="../src/scripts/global/navigation.js"></script>
  <script src="../src/scripts/global/interactions.js"></script>
  <script src="../src/scripts/global/main.js"></script>
  <!-- Page -->
  <script src="../src/scripts/pages/prices.js"></script>
</body>
</html>
